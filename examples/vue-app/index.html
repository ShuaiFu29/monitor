<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor SDK — Vue 3 Example</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1c2c 0%, #2d3436 100%);
      color: #dfe6e9; min-height: 100vh;
    }
    .app { max-width: 860px; margin: 0 auto; padding: 24px; }
    .header {
      background: linear-gradient(135deg, #00b894, #00cec9);
      padding: 32px 24px; border-radius: 16px; margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,190,148,0.3);
    }
    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; color: #fff; }
    .header p { font-size: 14px; opacity: 0.9; color: #fff; }
    .status-bar {
      display: flex; gap: 20px; padding: 10px 16px;
      background: rgba(255,255,255,0.05); border-radius: 8px;
      font-size: 13px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1);
    }
    .card {
      background: rgba(255,255,255,0.04); border-radius: 12px; padding: 20px;
      margin-bottom: 14px; border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }
    .card h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: #dfe6e9; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      padding: 10px 18px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer; color: #fff;
      transition: all 0.2s;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .event-log {
      background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
      max-height: 280px; overflow-y: auto; line-height: 1.7;
    }
    .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .log-time { color: #636e72; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600; margin-right: 6px;
    }
    .log-msg { color: #b2bec3; }
    .fade-enter-active { transition: opacity 0.3s, transform 0.3s; }
    .fade-enter-from { opacity: 0; transform: translateY(-8px); }
    input {
      width: 100%; padding: 10px 14px; background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      color: #dfe6e9; font-size: 14px; margin-bottom: 8px; outline: none;
    }
    input:focus { border-color: #00b894; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="../../tests/e2e/fixtures/monitor-sdk.js"></script>
  <script>
    const { createApp, ref, reactive, onMounted, nextTick, computed } = Vue;

    // ── SDK Init ──
    const monitor = MonitorSDK.createMonitor({
      dsn: 'https://example.com/api/report',
      sampleRate: 1.0, errorSampleRate: 1.0, performanceSampleRate: 1.0,
      batchSize: 5, flushInterval: 3000,
      plugins: [
        MonitorSDK.errorPlugin(),
        MonitorSDK.performancePlugin(),
        MonitorSDK.networkPlugin({ ignoreUrls: [/example\.com/] }),
        new MonitorSDK.BehaviorPlugin(),
      ],
    });

    const badgeColors = {
      error: '#e74c3c', network: '#3498db', performance: '#f39c12',
      custom: '#9b59b6', behavior: '#1abc9c', action: '#7f8c8d', init: '#2ecc71',
    };

    createApp({
      template: `
        <div class="app">
          <div class="header">
            <h1>🍃 Monitor SDK — Vue 3</h1>
            <p>Vue 3 Composition API integration with reactive event tracking</p>
          </div>

          <div class="status-bar">
            <span>● Status: <strong>{{ sdkActive ? '🟢 Active' : '🔴 Destroyed' }}</strong></span>
            <span>Session: <strong>{{ sessionId }}</strong></span>
            <span>Events: <strong>{{ logs.length }}</strong></span>
          </div>

          <div class="card">
            <h3>🐛 Error Tracking</h3>
            <div class="btn-row">
              <button class="btn" style="background:#e74c3c" @click="triggerError('ref')">ReferenceError</button>
              <button class="btn" style="background:#e67e22" @click="triggerError('type')">TypeError</button>
              <button class="btn" style="background:#c0392b" @click="triggerError('promise')">Promise Rejection</button>
            </div>
          </div>

          <div class="card">
            <h3>🌐 Network</h3>
            <div class="btn-row">
              <button class="btn" style="background:#2980b9" @click="doFetch(200)">Fetch 200</button>
              <button class="btn" style="background:#8e44ad" @click="doFetch(404)">Fetch 404</button>
              <button class="btn" style="background:#2c3e50" @click="doXHR()">XHR Request</button>
            </div>
          </div>

          <div class="card">
            <h3>📊 Custom Events & User</h3>
            <div class="btn-row" style="margin-bottom:12px">
              <button class="btn" style="background:#8e44ad" @click="trackEvent()">Track Event</button>
              <button class="btn" style="background:#27ae60" @click="setUser()">Set User</button>
              <button class="btn" style="background:#16a085" @click="navigate('/products')">Go /products</button>
              <button class="btn" style="background:#16a085" @click="navigate('/cart')">Go /cart</button>
              <button class="btn" style="background:#2c3e50" @click="destroySDK()">Destroy SDK</button>
            </div>
            <input v-model="userName" placeholder="Your name" />
            <input v-model="userEmail" type="email" placeholder="Email" />
          </div>

          <div class="card">
            <h3>📋 Event Log ({{ logs.length }})</h3>
            <div class="event-log" ref="logEl">
              <transition-group name="fade">
                <div v-for="(entry, i) in logs" :key="i" class="log-entry">
                  <span class="log-time">[{{ entry.time }}]</span>
                  <span class="badge" :style="{ background: getBadgeColor(entry.type) }">{{ entry.type }}</span>
                  <span class="log-msg">{{ entry.message }}</span>
                </div>
              </transition-group>
            </div>
          </div>
        </div>
      `,

      setup() {
        const logs = reactive([{ time: timeNow(), type: 'init', message: 'SDK initialized with Vue 3' }]);
        const sdkActive = ref(true);
        const userName = ref('');
        const userEmail = ref('');
        const logEl = ref(null);
        const sessionId = monitor.getSessionId().slice(0, 8) + '...';

        function timeNow() { return new Date().toLocaleTimeString(); }

        function addLog(type, message) {
          logs.push({ time: timeNow(), type, message });
          nextTick(() => { if (logEl.value) logEl.value.scrollTop = logEl.value.scrollHeight; });
        }

        function getBadgeColor(type) { return badgeColors[type] || '#7f8c8d'; }

        onMounted(() => {
          monitor.eventBus.on('event:captured', (event) => {
            addLog(event.type || 'custom', event.action || event.message || 'event captured');
          });
        });

        function triggerError(kind) {
          addLog('action', 'Triggering ' + kind + ' error...');
          if (kind === 'ref') setTimeout(() => { undefinedVariable.x; }, 10);
          else if (kind === 'type') setTimeout(() => { null.method(); }, 10);
          else Promise.reject(new Error('Vue unhandled rejection'));
        }

        async function doFetch(status) {
          addLog('action', 'Fetching status ' + status + '...');
          try {
            const res = await fetch('https://httpbin.org/status/' + status);
            addLog('network', 'Response: ' + res.status);
          } catch (e) { addLog('network', 'Error: ' + e.message); }
        }

        function doXHR() {
          addLog('action', 'Sending XHR...');
          const xhr = new XMLHttpRequest();
          xhr.open('GET', 'https://httpbin.org/get');
          xhr.onload = () => addLog('network', 'XHR: ' + xhr.status);
          xhr.onerror = () => addLog('network', 'XHR error');
          xhr.send();
        }

        function trackEvent() {
          monitor.captureEvent({ type: 'custom', action: 'vue_interaction', data: { framework: 'vue3' } });
          addLog('custom', 'Custom event tracked');
        }

        function setUser() {
          const name = userName.value || 'Vue User';
          const email = userEmail.value || 'vue@example.com';
          monitor.setUser({ id: 'vue-user-1', username: name, email });
          addLog('action', 'User: ' + name);
        }

        function navigate(path) {
          history.pushState(null, '', path);
          addLog('behavior', 'Navigated to ' + path);
        }

        function destroySDK() {
          monitor.destroy();
          sdkActive.value = false;
          addLog('action', 'SDK destroyed');
        }

        return {
          logs, sdkActive, userName, userEmail, logEl, sessionId,
          getBadgeColor, triggerError, doFetch, doXHR, trackEvent,
          setUser, navigate, destroySDK,
        };
      },
    }).mount('#app');
  </script>
</body>
</html>
